apiVersion: v1
kind: Service
metadata:
  name: baseball-ensemble-api
  namespace: baseball-production
  labels:
    app: baseball-ensemble-api
    version: v1
    environment: production
    component: api-gateway
spec:
  selector:
    app: baseball-ensemble-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 300
  healthCheckNodePort: false
  healthCheckProtocol: HTTP
  healthCheck:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  externalTrafficPolicy: Local
  internalTrafficPolicy: Local
