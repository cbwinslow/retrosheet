# Nginx Configuration for MLB Live Prediction Server
# WebSocket-enabled reverse proxy with SSL/TLS support

upstream mlb_websocket_backend {
    server localhost:8765;
    
    # Optional: Multiple backend servers for load balancing
    # server localhost:8766;
    # server localhost:8767;
    
    # Least connections load balancing (best for WebSockets)
    least_conn;
}

# HTTP server - redirects to HTTPS
server {
    listen 80;
    server_name cloudcurio.cc www.cloudcurio.cc predictions.cloudcurio.cc;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server - WebSocket proxy
server {
    listen 443 ssl http2;
    server_name cloudcurio.cc www.cloudcurio.cc predictions.cloudcurio.cc;
    
    # SSL/TLS Configuration (using Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/cloudcurio.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloudcurio.cc/privkey.pem;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/cloudcurio.cc/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Logging
    access_log /var/log/nginx/mlb-live-access.log;
    error_log /var/log/nginx/mlb-live-error.log;
    
    # WebSocket endpoint
    location /ws {
        # WebSocket proxy headers
        proxy_pass http://mlb_websocket_backend;
        proxy_http_version 1.1;
        
        # Required for WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket timeouts (important for long-lived connections)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
        
        # Disable buffering for real-time data
        proxy_buffering off;
        proxy_cache off;
        
        # Connection handling
        proxy_redirect off;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://mlb_websocket_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Short timeouts for health checks
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # Static dashboard files (optional - if serving dashboard from same server)
    location /dashboard {
        alias /opt/retrosheet/dashboard;
        index index.html;
        try_files $uri $uri/ =404;
        
        # Enable gzip for static assets
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;
    }
    
    # Root path - redirect to dashboard
    location = / {
        return 301 /dashboard/;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Rate limiting configuration (optional)
# Add to http {} block in nginx.conf:
# limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;
# 
# Then add to location /ws:
# limit_req zone=ws_limit burst=20 nodelay;
