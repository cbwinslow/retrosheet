# pytest.ini - Pytest configuration for baseball prediction system

[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require some dependencies)
    e2e: End-to-end tests (require full system)
    slow: Slow tests (>1s execution time)
    database: Tests requiring database connection
    benchmark: Performance benchmark tests
    compatibility: Compatibility and portability tests
    scripts: Script validation tests
    queries: SQL query tests
    functionality: Comprehensive functionality tests

# Warning filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    default::UserWarning

# Coverage configuration (if pytest-cov installed)
addopts =
    -v
    --tb=short
    --strict-markers

# Console output
console_output_style = progress

# Test timeout (seconds)
timeout = 300

# Ignore certain directories
norecursedirs =
    .git
    .tox
    .env
    venv
    __pycache__
    *.egg
    build
    dist
    data
    docs
    sql
    scripts

# Environment variables for tests
env =
    PGHOST=localhost
    PGPORT=5432
    PGDATABASE=retrosheet_test
    TESTING=true
