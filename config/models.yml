# Model configurations for the baseball platform
# Author: Agent cbwinslow/retrosheet
# Date: 2026-04-26

models:
  swing_decision:
    target: swing_decision
    family: xgboost
    features:
      - pitch_type
      - count_state
      - batter_hand
      - pitcher_hand
      - release_speed
      - plate_location
    hyperparameters:
      learning_rate: 0.1
      max_depth: 6
      n_estimators: 100

  pitch_outcome:
    target: pitch_outcome
    family: lightgbm
    features:
      - pitch_type
      - count_state
      - batter_hand
      - pitcher_hand
      - release_speed
      - movement
    hyperparameters:
      learning_rate: 0.05
      max_depth: 8
      n_estimators: 200

  game_outcome:
    target: game_outcome
    family: logistic_regression
    features:
      - starting_pitcher
      - team_form
      - park_factors
      - weather
    hyperparameters:
      C: 1.0
      max_iter: 1000
