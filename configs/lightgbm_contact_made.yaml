# MLB Prediction Model Configuration
# LightGBM Model for Contact Made Prediction

family: lightgbm
target: contact_made
features: advanced
seasons:
  - 2020
  - 2021
  - 2022
  - 2023
  - 2024
  - 2025

split_config:
  train_through: 2023
  validation: 0.15
  test: 0.15
  strategy: time_based

lightgbm:
  objective: binary
  metric: auc
  boosting_type: gbdt
  num_leaves: 31
  max_depth: -1
  learning_rate: 0.05
  n_estimators: 200
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_samples: 20
  reg_alpha: 0.0
  reg_lambda: 0.0
  random_state: 42
  n_jobs: -1
  verbose: -1

early_stopping:
  enabled: true
  patience: 15
  min_delta: 0.001
  restore_best_weights: true

calibration:
  enabled: true
  method: isotonic
  validation_fraction: 0.2

feature_importance:
  enabled: true
  method: gain
  top_n: 50

logging:
  level: INFO
  log_dir: logs
