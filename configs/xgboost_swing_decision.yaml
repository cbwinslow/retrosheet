# MLB Prediction Model Configuration
# XGBoost Model for Swing Decision Prediction

family: xgboost
target: swing_decision
features: advanced
seasons:
  - 2020
  - 2021
  - 2022
  - 2023
  - 2024
  - 2025

split_config:
  train_through: 2023
  validation: 0.15
  test: 0.15
  strategy: time_based

xgboost:
  max_depth: 6
  learning_rate: 0.1
  n_estimators: 200
  min_child_weight: 1
  subsample: 0.8
  colsample_bytree: 0.8
  gamma: 0
  reg_alpha: 0
  reg_lambda: 1
  scale_pos_weight: 1
  objective: binary:logistic
  eval_metric: auc
  use_label_encoder: false
  random_state: 42
  n_jobs: -1

early_stopping:
  enabled: true
  patience: 10
  min_delta: 0.001
  restore_best_weights: true

calibration:
  enabled: true
  method: isotonic
  validation_fraction: 0.2

feature_importance:
  enabled: true
  method: gain
  top_n: 50

logging:
  level: INFO
  log_dir: logs
  tensorboard: false
  mlflow: false
