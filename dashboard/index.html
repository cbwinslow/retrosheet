<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Live Predictions Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(90deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 40px;
            border-bottom: 2px solid #0f3460;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header .status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #e94560;
            font-weight: 500;
        }

        .header .status.connected {
            background: #16c79a;
        }

        .container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            font-weight: 500;
        }

        input, select, button {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a2e;
            color: #fff;
            font-size: 14px;
            min-width: 150px;
        }

        button {
            background: #0f3460;
            border-color: #0f3460;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background: #e94560;
            border-color: #e94560;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 24px;
        }

        .game-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #0f3460;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(233, 69, 96, 0.2);
        }

        .game-card.updating {
            border-color: #16c79a;
            box-shadow: 0 0 20px rgba(22, 199, 154, 0.3);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .game-status {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #0f3460;
            text-transform: uppercase;
            font-weight: 500;
        }

        .game-status.live {
            background: #e94560;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .team {
            text-align: center;
            flex: 1;
        }

        .team-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .team-score {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
        }

        .vs {
            font-size: 14px;
            color: #666;
            padding: 0 20px;
        }

        .situation {
            text-align: center;
            padding: 12px;
            background: rgba(15, 52, 96, 0.3);
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #aaa;
        }

        .probability-bar {
            position: relative;
            height: 48px;
            background: #0a0a0a;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .probability-fill {
            position: absolute;
            height: 100%;
            transition: width 0.5s ease;
        }

        .probability-fill.home {
            left: 0;
            background: linear-gradient(90deg, #16c79a 0%, #16c79a 100%);
        }

        .probability-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-weight: 600;
            font-size: 14px;
            z-index: 10;
        }

        .probability-text .home-pct {
            color: #fff;
        }

        .probability-text .away-pct {
            color: #fff;
        }

        .game-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #0f3460;
        }

        .detail {
            text-align: center;
        }

        .detail-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .last-update {
            text-align: center;
            font-size: 11px;
            color: #444;
            margin-top: 16px;
        }

        .no-games {
            text-align: center;
            padding: 60px;
            color: #666;
        }

        .no-games h2 {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .log {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            max-height: 200px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 16px;
            font-size: 12px;
            overflow-y: auto;
            display: none;
        }

        .log.visible {
            display: block;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #0f3460;
            color: #888;
        }

        .log-entry:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            ⚾ MLB Live Predictions
            <span id="connection-status" class="status">Disconnected</span>
        </h1>
    </div>

    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label>WebSocket URL</label>
                <input type="text" id="ws-url" value="ws://localhost:8765" placeholder="ws://localhost:8765">
            </div>
            <div class="control-group">
                <label>Game PK (optional)</label>
                <input type="number" id="game-pk" placeholder="Auto-discover">
            </div>
            <div class="control-group">
                <label>Action</label>
                <button id="connect-btn" onclick="toggleConnection()">Connect</button>
            </div>
            <div class="control-group">
                <label>View</label>
                <button onclick="toggleLog()">Toggle Log</button>
            </div>
        </div>

        <div id="games-container" class="games-grid">
            <div class="no-games">
                <h2>No Active Games</h2>
                <p>Connect to the WebSocket server to see live games and predictions.</p>
            </div>
        </div>
    </div>

    <div id="log" class="log"></div>

    <script>
        let ws = null;
        let connected = false;
        const games = new Map();

        function log(message) {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function toggleLog() {
            document.getElementById('log').classList.toggle('visible');
        }

        function toggleConnection() {
            if (connected) {
                disconnect();
            } else {
                connect();
            }
        }

        function connect() {
            const url = document.getElementById('ws-url').value;
            const gamePk = document.getElementById('game-pk').value;

            log(`Connecting to ${url}...`);

            ws = new WebSocket(url);

            ws.onopen = () => {
                connected = true;
                updateStatus(true);
                document.getElementById('connect-btn').textContent = 'Disconnect';
                log('Connected to server');

                // Get list of games
                ws.send(JSON.stringify({ command: 'games' }));

                // Subscribe to specific game if provided
                if (gamePk) {
                    ws.send(JSON.stringify({ command: 'subscribe', game_pk: parseInt(gamePk) }));
                }
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };

            ws.onclose = () => {
                connected = false;
                updateStatus(false);
                document.getElementById('connect-btn').textContent = 'Connect';
                log('Disconnected from server');
            };

            ws.onerror = (error) => {
                log(`Error: ${error.message || 'Connection failed'}`);
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
            }
        }

        function updateStatus(isConnected) {
            const statusEl = document.getElementById('connection-status');
            if (isConnected) {
                statusEl.textContent = 'Connected';
                statusEl.classList.add('connected');
            } else {
                statusEl.textContent = 'Disconnected';
                statusEl.classList.remove('connected');
            }
        }

        function handleMessage(data) {
            log(`Received: ${data.type}`);

            switch (data.type) {
                case 'connected':
                    log(`Server: ${data.message}`);
                    break;

                case 'games':
                    updateGamesList(data.games);
                    break;

                case 'prediction':
                    updatePrediction(data);
                    break;

                case 'subscribed':
                    log(`Subscribed to game ${data.game_pk}`);
                    break;

                case 'error':
                    log(`Error: ${data.message}`);
                    break;
            }
        }

        function updateGamesList(gamesList) {
            const container = document.getElementById('games-container');

            if (!gamesList || gamesList.length === 0) {
                container.innerHTML = `
                    <div class="no-games">
                        <h2>No Active Games</h2>
                        <p>No live games currently available.</p>
                    </div>
                `;
                return;
            }

            // Subscribe to all games
            gamesList.forEach(game => {
                if (!games.has(game.game_pk)) {
                    ws.send(JSON.stringify({ command: 'subscribe', game_pk: game.game_pk }));
                }
            });
        }

        function updatePrediction(data) {
            const gamePk = data.game_pk;
            const gameState = data.game_state;
            const prediction = data.prediction;

            games.set(gamePk, { ...data, lastUpdate: Date.now() });
            renderGames();
        }

        function renderGames() {
            const container = document.getElementById('games-container');

            if (games.size === 0) return;

            const gamesHtml = Array.from(games.values()).map(game => {
                const gs = game.game_state;
                const pred = game.prediction;
                const homeProb = pred.home_win_probability * 100;
                const awayProb = pred.away_win_probability * 100;
                const isLive = gs.status === 'Live' || gs.status === 'In Progress';

                return `
                    <div class="game-card ${isLive ? 'updating' : ''}" data-game="${game.game_pk}">
                        <div class="game-header">
                            <div class="game-status ${isLive ? 'live' : ''}">${gs.status}</div>
                            <div>Inning ${gs.inning} ${gs.is_top ? '▲' : '▼'}</div>
                        </div>

                        <div class="teams">
                            <div class="team">
                                <div class="team-name">Away</div>
                                <div class="team-score">${gs.away_score}</div>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <div class="team-name">Home</div>
                                <div class="team-score">${gs.home_score}</div>
                            </div>
                        </div>

                        <div class="situation">
                            ${gs.outs} outs, ${gs.balls}-${gs.strikes} count
                            ${gs.base_state > 0 ? '• Runners on base' : ''}
                        </div>

                        <div class="probability-bar">
                            <div class="probability-fill home" style="width: ${homeProb}%"></div>
                            <div class="probability-text">
                                <span class="home-pct">${homeProb.toFixed(1)}%</span>
                                <span class="away-pct">${awayProb.toFixed(1)}%</span>
                            </div>
                        </div>

                        <div class="game-details">
                            <div class="detail">
                                <div class="detail-label">Confidence</div>
                                <div class="detail-value">${(pred.confidence * 100).toFixed(0)}%</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">Latency</div>
                                <div class="detail-value">${pred.latency_ms.toFixed(0)}ms</div>
                            </div>
                            <div class="detail">
                                <div class="detail-label">Model</div>
                                <div class="detail-value">${pred.model_version}</div>
                            </div>
                        </div>

                        <div class="last-update">
                            Last update: ${new Date().toLocaleTimeString()}
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = gamesHtml;
        }

        // Auto-refresh render every second for live indicators
        setInterval(() => {
            if (games.size > 0) {
                renderGames();
            }
        }, 1000);
    </script>
</body>
</html>
