name: Knowledge Base Embeddings

# This workflow builds the vector store (embeddings) for the knowledge base
# using the existing LlamaIndex ingestion script. It runs on pushes to the
# default branch and on a nightly schedule, then uploads the generated index
# as an artifact for downstream jobs or manual download.

on:
  push:
    branches: [master, setup-complete]
  schedule:
    # Run nightly at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build-embeddings:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ensure LlamaIndex and any embedding model libraries are installed
          pip install llama-index openai

      - name: Run embedding ingestion
        env:
          # Pass any required environment variables for the embedding model
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/ingest_kb_llamaindex.py

      - name: Upload embeddings artifact
        uses: actions/upload-artifact@v4
        with:
          name: kb-embeddings
          path: kb/index/
          if-no-files-found: error
