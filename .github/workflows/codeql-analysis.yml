--
— File: .github/workflows/codeql-analysis.yml
— Purpose: GitHub Actions workflow for CodeQL security analysis
— Author: Agent KiloSwift
— Date: 2026-04-27
— Usage: Automatic on push to main/master branches and pull requests
— Notes: This workflow runs CodeQL to identify security vulnerabilities
—

name: "CodeQL Analysis"

on:
  push:
    branches: [ "main", "master", "setup-complete" ]
  pull_request:
    branches: [ "main", "master", "setup-complete" ]
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python', 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-and-quality
        config-file: .github/codeql/codeql-config.yml

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"
        upload: true

  # Additional SQL analysis using custom tooling
  analyze-sql:
    name: SQL Security Analysis
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install sqlfluff

    - name: Run SQL Security Linting
      run: |
        # Run sqlfluff with security rules enabled
        echo "🔍 Running SQL security analysis..."
        sqlfluff lint sql/ --rules L6,L7,L8,M --format json --output sql_security_report.json || true

    - name: Upload SQL Security Report
      uses: actions/upload-artifact@v4
      with:
        name: sql-security-report
        path: sql_security_report.json

  # Run bandit for Python security scanning
  bandit-scan:
    name: Python Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install bandit
      run: pip install bandit

    - name: Run bandit security scan
      run: |
        bandit -r . -f json -o bandit-report.json || true
        bandit -r . -f html -o bandit-report.html || true

    - name: Upload Bandit Report
      uses: actions/upload-artifact@v4
      with:
        name: python-security-report
        path: |
          bandit-report.json
          bandit-report.html

  # Dependency vulnerability scanning
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Run pip-audit
      run: |
        pip-audit --desc --format json --output pip-audit-report.json || true

    - name: Upload pip-audit Report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-vulnerability-report
        path: pip-audit-report.json
