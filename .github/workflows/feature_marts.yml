name: Feature Marts Migration

on:
  push:
    branches: [main, master, setup-complete]
  schedule:
    # Nightly run at 03:00 UTC to keep marts up‑to‑date
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: retrosheet
        ports:
          - 5432:5432
        # Give the DB a moment to start
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 && break || sleep 3;
          done

      - name: Run feature‑mart migration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/retrosheet
        run: |
          python scripts/migrate_feature_marts.py

      - name: Upload migration logs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-mart-logs
          path: logs/
