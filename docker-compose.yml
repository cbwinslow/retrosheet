version: '3.8'

services:
  mcp-gateway:
    image: docker/mcp-gateway:latest
    ports:
      - "8081:8080"
    command:
      - --transport=streaming
      - --port=8080
      - --servers=postgresql,postgres-retrosheet,github-mcp-server
      - --log-calls
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_MCP_SECRETS_PATH=docker-desktop

  postgresql:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: 123qweasd
      POSTGRES_USER: cbwinslow
      POSTGRES_DB: epstein
    healthcheck:
      test: pg_isready -U cbwinslow
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-retrosheet:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: 
      POSTGRES_USER: cbwinslow
      POSTGRES_DB: retrosheet
    healthcheck:
      test: pg_isready -U cbwinslow
      interval: 5s
      timeout: 5s
      retries: 5

  github-mcp-server:
    image: ghcr.io/github/github-mcp-server:latest
    environment:
      # GITHUB_PERSONAL_ACCESS_TOKEN: 

configs:
  mcp_configs:
    content: |
      postgresql:
        host: postgresql
        port: 5432
        database: epstein
        username: cbwinslow
        password: 123qweasd

      postgres-retrosheet:
        host: postgres-retrosheet
        port: 5432
        database: retrosheet
        username: cbwinslow

      github-mcp-server:
        base_url: https://api.github.com
        timeout: 30s

secrets:
  mcp_secrets:
    file: .env